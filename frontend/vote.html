<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vote</title>
</head>
<body style="margin:0; font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); min-height:100vh; color:white;">

  <div style="background:rgba(255,255,255,0.05); padding:18px 40px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.1);">
    <h2 style="margin:0; color:#e94560;">🗳️ Voting App</h2>
    <button onclick="logout()"
      style="background:rgba(233,69,96,0.2); color:#e94560; border:1px solid #e94560; padding:8px 20px; border-radius:8px; cursor:pointer;">
      Logout
    </button>
  </div>

  <div style="max-width:800px; margin:40px auto; padding:0 20px; text-align:center;">
    <h2 style="color:#a8b2d8; letter-spacing:2px;">— CHOOSE YOUR CANDIDATE —</h2>
    <div id="candidates" style="display:flex; gap:24px; justify-content:center; flex-wrap:wrap; margin:30px 0;"></div>
    <p id="message" style="font-size:1.1rem; margin-top:20px;"></p>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login.html';

    const candidates = ['Vijay', 'Rahul', 'Kowshik'];
    const container = document.getElementById('candidates');

    container.innerHTML = candidates.map(name => `
      <div style="background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15); border-radius:16px; padding:30px 35px; text-align:center; min-width:180px;">
        <div style="width:60px; height:60px; border-radius:50%; background:linear-gradient(135deg,#e94560,#0f3460); margin:0 auto 14px; line-height:60px; font-size:1.6rem; font-weight:bold;">
          ${name.charAt(0)}
        </div>
        <h3 style="margin:0 0 16px; color:white;">${name}</h3>
        <button onclick="vote('${name}')"
          id="btn-${name}"
          style="background:linear-gradient(135deg,#e94560,#c62a47); color:white; border:none; padding:12px 28px; border-radius:25px; cursor:pointer; font-size:1rem; font-weight:bold; width:100%;">
          VOTE
        </button>
      </div>
    `).join('');

    async function vote(candidate) {
      const res = await fetch('/api/vote', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'authorization': token
        },
        body: JSON.stringify({ candidate })
      });

      const data = await res.json();
      const msg = document.getElementById('message');

      if (data.error) {
        msg.style.color = '#e94560';
        msg.textContent = '❌ ' + data.error;
      } else {
        msg.style.color = '#4cc9f0';
        msg.textContent = '✅ ' + data.message;
        candidates.forEach(name => {
          const btn = document.getElementById(`btn-${name}`);
          btn.disabled = true;
          btn.style.opacity = '0.4';
          btn.style.cursor = 'not-allowed';
        });
      }
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('role');
      window.location.href = '/login.html';
    }
  </script>
</body>
</html>
