<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Voting App</title>
</head>
<body style="margin:0; font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); min-height:100vh; display:flex; align-items:center; justify-content:center;">

  <div style="background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15); border-radius:20px; padding:45px 40px; width:340px; text-align:center;">
    <h1 style="color:#e94560; margin:0 0 6px; font-size:2rem;">🗳️</h1>
    <h2 style="color:white; margin:0 0 6px;">Voting App</h2>
    <p style="color:#a8b2d8; margin:0 0 28px; font-size:0.9rem;">Login to cast your vote</p>

    <input id="username" type="text" placeholder="Username"
      style="width:100%; padding:12px 16px; border-radius:10px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.08); color:white; font-size:1rem; margin-bottom:14px; box-sizing:border-box;" />

    <input id="password" type="password" placeholder="Password"
      style="width:100%; padding:12px 16px; border-radius:10px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.08); color:white; font-size:1rem; margin-bottom:20px; box-sizing:border-box;" />

    <button onclick="login()"
      style="width:100%; padding:13px; background:linear-gradient(135deg,#e94560,#c62a47); color:white; border:none; border-radius:10px; font-size:1rem; font-weight:bold; cursor:pointer; letter-spacing:1px;">
      LOGIN
    </button>

    <p id="error" style="color:#e94560; margin-top:14px; font-size:0.9rem;"></p>
  </div>

  <script>
    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      if (data.error) {
        document.getElementById('error').textContent = '❌ ' + data.error;
        return;
      }

      localStorage.setItem('token', data.token);
      localStorage.setItem('role', data.role);

      if (data.role === 'admin') {
        window.location.href = '/admin.html';
      } else {
        window.location.href = '/vote.html';
      }
    }
  </script>
</body>
</html>
